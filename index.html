<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sudoku Solver — Masukkan angka-angka Sudoku dan dapatkan jawabannya secara instan." />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Toast notification container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <h1 class="header__title">Sudoku Solver</h1>
      <p class="header__subtitle">Masukkan angka, tekan Solve, dan dapatkan jawabannya ✨</p>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat">
        <span class="stat__value" id="stat-filled">0</span>
        <span class="stat__label">Terisi</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="stat-empty">81</span>
        <span class="stat__label">Kosong</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="stat-time">—</span>
        <span class="stat__label">Waktu</span>
      </div>
    </div>

    <!-- Board -->
    <div class="board-card">
      <div class="sudoku-grid" id="sudoku-grid">
        <!-- 81 cells generated by JS -->
      </div>
    </div>


    <!-- Action buttons -->
    <div class="controls">
      <button class="btn btn--primary" id="btn-solve">
        <span class="btn__text">🧩 Solve</span>
      </button>
      <button class="btn btn--secondary" id="btn-reset">
        <span class="btn__text">↺ Reset</span>
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      Dibuat dengan ❤️ — Sudoku Solver &copy; 2026
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
